<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寻猕探心 · 修文猕猴桃溯源</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f0f5eb 0%, #e8f5e9 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            max-width: 420px; width: 100%;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,40,0,0.08);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #3B7A3B 0%, #1F4F1F 100%);
            padding: 30px 20px; text-align: center; color: white;
        }
        .header .logo { font-size: 48px; margin-bottom: 8px; }
        .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
        .header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 4px; }
        .info-list { padding: 24px 20px; }
        .info-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px dashed #e0e0e0; font-size: 15px;
        }
        .info-item:last-child { border-bottom: none; }
        .info-label { color: #666; font-weight: 500; flex-shrink: 0; margin-right: 12px; }
        .info-value { color: #1a1a1a; font-weight: 600; text-align: right; word-break: break-all; }
        .highlight { color: #3B7A3B; }
        .badge {
            display: inline-block; background: #e8f5e9; color: #2e7d32;
            padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 700;
        }
        .footer {
            padding: 20px; text-align: center; background: #fafafa;
            color: #888; font-size: 12px; border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">🥝</div>
            <h1>修文猕猴桃 · 贵长特级</h1>
            <div class="subtitle">🍃 寻猕探心 · 一物一码溯源认证</div>
        </div>
        <div class="info-list" id="info-container"></div>
        <div class="footer">
            <strong>贵州 · 修文县平滩村</strong><br>
            国家地理标志保护产品 | 土壤天然富硒认证
        </div>
    </div>
    <script>
        function getUrlParam(paramName) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(paramName);
        }
        const orchard = getUrlParam('orchard') || '黄良华果园 · 3号地块';
        const farmer  = getUrlParam('farmer')  || '黄良华';
        const date    = getUrlParam('date')    || '2026年10月12日';
        const se      = getUrlParam('se')      || '0.12 mg/kg';
        const sugar   = getUrlParam('sugar')   || '18:1';
        const traceId = getUrlParam('id')      || 'XMTX-A001';
        const infoData = [
            { label: '🍑 产品名称', value: '贵长猕猴桃（特级精选）' },
            { label: '📍 产地果园', value: orchard },
            { label: '👨‍🌾 种植果农', value: farmer },
            { label: '📅 采摘日期', value: date },
            { label: '🧪 硒含量',    value: se + ' <span class="badge">富硒认证</span>' },
            { label: '🍬 黄金甜酸比', value: sugar },
            { label: '🌱 种植方式',   value: '绿肥翻压 · 林下养蚯蚓' },
            { label: '🆔 溯源编码',   value: traceId }
        ];
        const container = document.getElementById('info-container');
        infoData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'info-item';
            div.innerHTML = `
                <span class="info-label">${item.label}</span>
                <span class="info-value highlight">${item.value}</span>
            `;
            container.appendChild(div);
        });
    </script>
</body>
</html>
